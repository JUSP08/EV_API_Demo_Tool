<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EV API Tester</title>
    <link rel="stylesheet" href="styles.css?v=20260529-deployable" />
  </head>
  <body>
    <main class="shell">
      <header>
        <p>Energy Valve local API tester</p>
        <h1>Write Energy Valve Datapoints</h1>
      </header>

      <section class="card connection-card">
        <div class="grid">
          <label>
            <span>Valve IP address</span>
            <input id="ip" value="169.254.1.1" autocomplete="off" />
          </label>

          <label>
            <span>Second valve IP optional</span>
            <input id="secondaryIp" placeholder="Optional" autocomplete="off" />
          </label>

          <label>
            <span>Username</span>
            <input id="username" value="admin" autocomplete="username" />
          </label>

          <label>
            <span>Password</span>
            <input id="password" type="password" autocomplete="current-password" />
          </label>
        </div>

        <label class="checkbox-row">
          <input id="saveLocal" type="checkbox" checked />
          <span>Save values locally in this browser</span>
        </label>
      </section>

      <section class="card datapoint-card-shell tool-layout">
        <div id="datapointList" class="datapoint-list" aria-label="Available datapoints"></div>
        <aside class="output-state-column" aria-label="Output state endpoints">
          <h2>Output State</h2>
          <div id="outputStateList" class="output-state-list"></div>
        </aside>
      </section>

      <section class="card response-card">
        <div class="response-head">
          <h2>Response</h2>
          <span id="status" class="status idle">Idle</span>
        </div>
        <pre id="response">No request sent yet.</pre>
      </section>

      <details class="card advanced-card">
        <summary>Advanced</summary>
        <label>
          <span>Selected endpoint</span>
          <input id="endpoint" value="/api/v1/mpmodelid/2106" autocomplete="off" />
        </label>
        <div class="preview">
          <div>
            <span>Command preview</span>
            <code id="preview"></code>
          </div>
        </div>
      </details>
    </main>

    <script src="app.js?v=20260529-deployable"></script>
  </body>
</html>
